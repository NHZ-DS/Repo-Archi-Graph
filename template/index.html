<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo-Archi-Graph - IBM Bob Hackathon</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 350px;
            background-color: #11111b;
            border-right: 2px solid #45475a;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #graph-container {
            flex-grow: 1;
            height: 100%;
            position: relative;
        }
        h1 {
            font-size: 1.5rem;
            color: #89b4fa;
            margin-top: 0;
            border-bottom: 1px solid #45475a;
            padding-bottom: 10px;
        }
        .card {
            background-color: #181825;
            border: 1px solid #45475a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        .card h3 {
            margin-top: 0;
            color: #a6e3a1;
        }
        #file-summary {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #bac2de;
        }
        .footer-tag {
            font-size: 0.8rem;
            color: #6c7086;
            text-align: center;
            border-top: 1px solid #45475a;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div>
            <h1>📦 Repo-Archi-Graph</h1>
            <p style="font-size: 0.9rem; color: #a6adc8;">Click on any file node in the graph to inspect its architectural purpose.</p>
            
            <div class="card" id="details-card">
                <h3 id="file-name">Select a file</h3>
                <p id="file-group" style="font-style: italic; font-size: 0.85rem; color: #f9e2af; margin-bottom: 10px;"></p>
                <div id="file-summary">No file selected. Click on a node to see the AI architectural analysis.</div>
            </div>
        </div>
        <div class="footer-tag">Powered by IBM Bob AI Dev Partner</div>
    </div>

    <div id="graph-container"></div>

    <script>
        // Fetch the architecture JSON data generated by IBM Bob
        fetch('../output/architecture.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('graph-container');
                
                // Color mapping for different file groups
                const colors = {
                    python: '#3776AB',
                    javascript: '#F7DF1E',
                    frontend: '#61DAFB',
                    backend: '#89b4fa',
                    logic: '#a6e3a1'
                };

                // Format nodes for Vis.js
                const formattedNodes = data.nodes.map(node => ({
                    id: node.id,
                    label: node.label,
                    title: node.id,
                    shape: 'dot',
                    size: 25,
                    color: {
                        background: colors[node.group.toLowerCase()] || '#cdd6f4',
                        border: '#45475a',
                        highlight: { background: '#f5c2e7', border: '#f5c2e7' }
                    },
                    font: { color: '#cdd6f4', size: 14, face: 'monospace' },
                    summary: node.summary,
                    groupName: node.group
                }));

                const dataset = {
                    nodes: new vis.DataSet(formattedNodes),
                    edges: new vis.DataSet(data.edges)
                };

                const options = {
                    nodes: { borderWidth: 2 },
                    edges: {
                        arrows: { to: { enabled: true, scaleFactor: 1 } },
                        color: { color: '#6c7086', highlight: '#f5c2e7' },
                        font: { size: 10, align: 'horizontal', color: '#a6adc8' },
                        smooth: { type: 'cubicBezier' }
                    },
                    physics: {
                        enabled: true,
                        barnesHut: { gravitationalConstant: -2000, centralGravity: 0.3, springLength: 95 }
                    }
                };

                const network = new vis.Network(container, dataset, options);

                // Handle click events to show metadata in the sidebar
                network.on("click", function (params) {
                    if (params.nodes.length > 0) {
                        const nodeId = params.nodes[0];
                        const clickedNode = formattedNodes.find(n => n.id === nodeId);
                        
                        if (clickedNode) {
                            document.getElementById('file-name').innerText = clickedNode.label;
                            document.getElementById('file-group').innerText = `Type/Layer: ${clickedNode.groupName}`;
                            document.getElementById('file-summary').innerText = clickedNode.summary;
                        }
                    }
                });
            })
            .catch(error => {
                console.error("Error loading architecture JSON:", error);
                document.getElementById('file-summary').innerHTML = "<span style='color: #f38ba8;'>Error: Could not load 'output/architecture.json'. Make sure to run the scanner or feed the JSON template first!</span>";
            });
    </script>
</body>
</html>
